<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Clymb AI Provenance Platform</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1e293b; line-height: 1.6; background: #f8fafc; }
.container { max-width: 640px; margin: 0 auto; padding: 60px 24px; }
h1 { font-size: 2rem; margin-bottom: 8px; }
p { color: #64748b; margin-bottom: 24px; }
a { color: #3b82f6; text-decoration: none; }
.form-group { margin-bottom: 20px; }
label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
textarea { min-height: 150px; resize: vertical; }
.btn { display: inline-block; padding: 14px 32px; background: #3b82f6; color: white; border: none;
  border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #2563eb; }
.btn:disabled { background: #94a3b8; cursor: not-allowed; }
.success { background: #ecfdf5; border: 1px solid #10b981; padding: 16px; border-radius: 8px;
  color: #065f46; display: none; margin-top: 16px; }
.back { display: inline-block; margin-bottom: 24px; color: #64748b; font-size: 0.9rem; }
.info { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 16px; border-radius: 4px;
  margin-bottom: 24px; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
<a href="/" class="back">&larr; Back to home</a>
<h1>Contact Us</h1>
<p>Questions about the API, enterprise pricing, or EU AI Act compliance? We'll get back to you within 24 hours.</p>

<div class="info">
<strong>Direct email:</strong> <a href="mailto:alastair.mccaffer@hotmail.co.uk">alastair.mccaffer@hotmail.co.uk</a><br>
<strong>Patent enquiries:</strong> GB2607042.5 — Clymb Ltd
</div>

<form id="contactForm" onsubmit="sendForm(event)">
  <div class="form-group">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" required placeholder="Jane Smith">
  </div>
  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="jane@company.com">
  </div>
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" required placeholder="Tell us about your use case, team size, or any questions about the API..."></textarea>
  </div>
  <button type="submit" class="btn" id="submitBtn">Send Message</button>
</form>

<div class="success" id="successMsg">
  <strong>Message sent!</strong> We'll get back to you within 24 hours.
</div>

<script>
async function sendForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const resp = await fetch('/contact/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
      })
    });
    if (resp.ok) {
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    } else {
      btn.textContent = 'Error — try again';
      btn.disabled = false;
    }
  } catch(err) {
    btn.textContent = 'Error — try again';
    btn.disabled = false;
  }
}
</script>
</div>
</body>
</html>
